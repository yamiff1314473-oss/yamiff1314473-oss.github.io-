<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi Goldita 💜</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    font-family: Arial, sans-serif;
}

/* Estrellas */
.stars{
    width:1px;
    height:1px;
    background:transparent;
    box-shadow:
    100px 200px white,
    300px 400px white,
    500px 100px white,
    700px 300px white,
    900px 500px white,
    1200px 200px white,
    1400px 400px white;
    animation: animStar 50s linear infinite;
}

@keyframes animStar{
    from{transform: translateY(0px);}
    to{transform: translateY(-2000px);}
}

/* Texto */
h1{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    color:#ff69b4;
    font-size:35px;
    text-shadow:0 0 20px #ff69b4, 0 0 40px #ff1493;
}
</style>
</head>

<body>
<div class="stars"></div>

<h1>Te amo mi goldita hermosa 💖</h1>

</body>
</html>
