<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Galaxia</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

.stars{
  width:1px;
  height:1px;
  background:white;
  position:absolute;
  animation:animStar 50s linear infinite;
  box-shadow:
  200px 100px #fff, 400px 300px #fff, 600px 500px #fff,
  800px 200px #fff, 1000px 400px #fff,
  1200px 100px #fff, 1400px 600px #fff,
  1600px 300px #fff, 1800px 500px #fff;
}

@keyframes animStar{
  from{transform: translateY(0px);}
  to{transform: translateY(-2000px);}
}

h1{
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  color:#ff69b4;
  font-size:40px;
  text-shadow:0 0 20px #ff69b4;
}
</style>
</head>

<body>

<div class="stars"></div>

<h1 id="mensaje">Escribe aquí tu mensaje</h1>

<script>
function cambiarMensaje(){
  var texto = prompt("Escribe el apodo o mensaje:");
  if(texto){
    document.getElementById("mensaje").innerHTML = texto;
  }
}
document.body.onclick = cambiarMensaje;
</script>

</body>
</html>
