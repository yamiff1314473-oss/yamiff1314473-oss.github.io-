<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Goldix 💜</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

#mensaje{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:22px;
  font-weight:bold;
  text-shadow:0 0 25px violet;
  z-index:2;
}

.spotify{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
}
</style>
</head>
<body>

<div id="mensaje">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita 💫
</div>

<div class="spotify">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/46U8ErW47SBTzO6jzxfZlx"
width="300"
height="80"
frameborder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// Nebulosa
const textureLoader = new THREE.TextureLoader();
const nebulaTexture = textureLoader.load("https://threejsfundamentals.org/threejs/resources/images/star.png");
const nebulaGeometry = new THREE.SphereGeometry(120, 64, 64);
const nebulaMaterial = new THREE.MeshBasicMaterial({
  map: nebulaTexture,
  side: THREE.BackSide,
  transparent:true,
  opacity:0.15
});
const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
scene.add(nebula);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// PLANETA PRO
const geometry = new THREE.SphereGeometry(2, 128, 128);
const material = new THREE.MeshStandardMaterial({
  color: 0x9d4edd,
  emissive: 0x5a189a,
  metalness: 0.5,
  roughness: 0.6
});
const planet = new THREE.Mesh(geometry, material);
scene.add(planet);

// Aura
const glowGeometry = new THREE.SphereGeometry(2.3, 128, 128);
const glowMaterial = new THREE.MeshBasicMaterial({
  color: 0xc77dff,
  transparent: true,
  opacity: 0.25
});
const glow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(glow);

// Anillo
const ringGeometry = new THREE.RingGeometry(2.8, 3.8, 128);
const ringMaterial = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.4
});
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2.4;
scene.add(ring);

// Luces
const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(5, 5, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0x9d4edd, 1.5);
light2.position.set(-5, -3, -5);
scene.add(light2);

// ESTRELLAS
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 6000;
const posArray = new Float32Array(starsCount * 3);

for(let i=0;i<starsCount*3;i++){
  posArray[i]=(Math.random()-0.5)*400;
}

starsGeometry.setAttribute('position',new THREE.BufferAttribute(posArray,3));
const starsMaterial = new THREE.PointsMaterial({size:0.3});
const starsMesh = new THREE.Points(starsGeometry,starsMaterial);
scene.add(starsMesh);

// FRASES
const frases = [
"Mi amor 💕","Mi vida 💖","Mi princesa 👑","Mi reina 🌹",
"Mi luna 🌙","Mi sol ☀","Mi estrella ✨","Mi galaxia 💫",
"Mi perla 🤍","Mi tesoro 💎","Mi bb 🥺","Mi goldita 💜",
"Mi negrita 😘","Mi todo 💞","Mi cielo 🌌",
"Te amo 💜","Te amo mi Goldix hermosa 🥺",
"Mi mundo 🌍","Mi universo 🌠","Mi bombón 🍬",
"Mi corazón ❤️","Mi niña hermosa 💕"
];

const grupoTextos = new THREE.Group();
scene.add(grupoTextos);

function crearTexto(texto){
  const canvas = document.createElement("canvas");
  const context = canvas.getContext("2d");
  canvas.width = 512;
  canvas.height = 128;
  context.font="40px Arial";
  context.fillStyle="white";
  context.fillText(texto,20,70);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({map:texture});
  const sprite = new THREE.Sprite(material);

  sprite.position.set(
    (Math.random()-0.5)*150,
    (Math.random()-0.5)*150,
    (Math.random()-0.5)*150
  );

  sprite.scale.set(6,1.5,1.5);
  grupoTextos.add(sprite);
}

for(let i=0;i<2500;i++){
  const fraseAleatoria = frases[Math.floor(Math.random()*frases.length)];
  crearTexto(fraseAleatoria);
}

// ANIMACIÓN
function animate(){
  requestAnimationFrame(animate);
  planet.rotation.y += 0.004;
  glow.rotation.y += 0.004;
  ring.rotation.z += 0.002;
  grupoTextos.rotation.y += 0.001;
  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
