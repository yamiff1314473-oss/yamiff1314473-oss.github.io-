<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Galaxia 💜</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

#textoSuperior{
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  color:white;
  font-size:20px;
  z-index:10;
}

#musicControl{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  z-index:10;
}
</style>
</head>
<body>

<div id="textoSuperior">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita ✨
</div>

<div id="musicControl">
<input type="file" id="fileInput" accept="audio/*">
<audio id="audio" controls></audio>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ESCENA
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES PARA GIRAR CON EL DEDO
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;

// LUZ
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// PLANETA
const geometry = new THREE.SphereGeometry(1.5, 64, 64);
const material = new THREE.MeshStandardMaterial({
  color: 0xaa00ff,
  emissive: 0x5500aa,
  roughness: 0.3,
  metalness: 0.6
});
const planet = new THREE.Mesh(geometry, material);
scene.add(planet);

// ANILLO
const ringGeometry = new THREE.RingGeometry(2, 2.6, 64);
const ringMaterial = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  side: THREE.DoubleSide,
  transparent:true,
  opacity:0.5
});
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2.5;
scene.add(ring);

// ESTRELLAS
const starsGeometry = new THREE.BufferGeometry();
const starsVertices = [];

for (let i = 0; i < 5000; i++) {
  starsVertices.push(
    THREE.MathUtils.randFloatSpread(200),
    THREE.MathUtils.randFloatSpread(200),
    THREE.MathUtils.randFloatSpread(200)
  );
}

starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));

const starsMaterial = new THREE.PointsMaterial({color:0xffffff});
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// ANIMACIÓN
function animate(){
  requestAnimationFrame(animate);
  planet.rotation.y += 0.002;
  ring.rotation.z += 0.001;
  renderer.render(scene,camera);
}
animate();

// MUSICA
const fileInput = document.getElementById("fileInput");
const audio = document.getElementById("audio");

fileInput.addEventListener("change", function(){
  const file = this.files[0];
  const url = URL.createObjectURL(file);
  audio.src = url;
  audio.play();
});

</script>
</body>
</html>
