<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Universo 💜</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

#mensaje{
position:absolute;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
font-weight:bold;
z-index:10;
text-shadow:0 0 15px #c77dff;
}

.frase{
position:absolute;
color:white;
opacity:0.8;
pointer-events:none;
white-space:nowrap;
text-shadow:0 0 6px rgba(255,255,255,0.8);
background:none !important;
}

iframe{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
border-radius:12px;
z-index:10;
}
</style>
</head>
<body>

<div id="mensaje">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita ✨
</div>

<iframe 
src="https://open.spotify.com/embed/track/46U8ErW47SBTzO6jzxfZlx"
width="300" height="80"
frameborder="0"
allow="autoplay; encrypted-media">
</iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 9;

// LUCES
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const light = new THREE.PointLight(0xffffff,1.5);
light.position.set(5,5,5);
scene.add(light);

// GRUPO
const group = new THREE.Group();
scene.add(group);

// PLANETA MEJORADO
const geometry = new THREE.SphereGeometry(2,128,128);
const material = new THREE.MeshStandardMaterial({
color:0x8e44ff,
emissive:0x5a189a,
emissiveIntensity:0.6,
metalness:0.5,
roughness:0.4
});
const planet = new THREE.Mesh(geometry,material);
group.add(planet);

// ANILLO BONITO
const ringGeo = new THREE.RingGeometry(2.6,3.6,128);
const ringMat = new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.25
});
const ring = new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x = Math.PI/2.5;
group.add(ring);

// ESTRELLAS PEQUEÑAS
const starGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<8000;i++){
starVertices.push(
(Math.random()-0.5)*250,
(Math.random()-0.5)*250,
(Math.random()-0.5)*250
);
}

starGeometry.setAttribute('position',
new THREE.Float32BufferAttribute(starVertices,3)
);

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.06
});

const stars = new THREE.Points(starGeometry,starMaterial);
scene.add(stars);

// FRASES SIN MANCHAS
const frases = [
"Te amo 💜","Mi princesa 👑","Mi reina ❤️","Mi luna 🌙",
"Mi perla 🤍","Mi sol ☀️","Mi estrella ✨",
"Mi galaxia favorita 🌌","Mi goldita 🥺",
"Mi universo 🚀","Mi niña hermosa 💕",
"Mi bombón 🍬","Mi tesoro 💎",
"Mi vida 💖","Mi todo 💘",
"Mi bb 🧸","Mi amor 💋",
"Mi cielo 🌠","Mi corazón ❤️","Mi angelito 😇"
];

for(let i=0;i<400;i++){
const div = document.createElement("div");
div.className="frase";
div.innerText=frases[Math.floor(Math.random()*frases.length)];
div.style.fontSize=(Math.random()*14+10)+"px";
div.style.left=Math.random()*window.innerWidth+"px";
div.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(div);
}

// CONTROL TÁCTIL
let isDragging=false;
let prevX=0;
let prevY=0;

document.addEventListener("touchstart",(e)=>{
isDragging=true;
prevX=e.touches[0].clientX;
prevY=e.touches[0].clientY;
});

document.addEventListener("touchend",()=>isDragging=false);

document.addEventListener("touchmove",(e)=>{
if(!isDragging) return;

let deltaX=e.touches[0].clientX-prevX;
let deltaY=e.touches[0].clientY-prevY;

group.rotation.y += deltaX*0.005;
group.rotation.x += deltaY*0.005;

prevX=e.touches[0].clientX;
prevY=e.touches[0].clientY;
});

// ANIMACIÓN
function animate(){
requestAnimationFrame(animate);
planet.rotation.y += 0.002;
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
