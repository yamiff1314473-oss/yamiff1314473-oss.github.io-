<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Universo 💜</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

#mensaje{
position:absolute;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
font-weight:bold;
z-index:10;
text-shadow:0 0 15px #c77dff;
}

iframe{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
z-index:10;
border-radius:12px;
}
</style>
</head>
<body>

<div id="mensaje">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita ✨
</div>

<iframe src="https://open.spotify.com/embed/track/46U8ErW47SBTzO6jzxfZlx"
width="300" height="80"
frameborder="0"
allow="autoplay; encrypted-media">
</iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 10;

// CONTROLES (FUNCIONA EN CELULAR)
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = true;

// LUCES
const light = new THREE.PointLight(0xffffff,2);
light.position.set(10,10,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040,2));

// -------- PLANETA PRINCIPAL --------
const planetGroup = new THREE.Group();
scene.add(planetGroup);

const geometry = new THREE.SphereGeometry(2,128,128);

const material = new THREE.MeshStandardMaterial({
color:0x9d4edd,
emissive:0x5a189a,
emissiveIntensity:0.6,
metalness:0.5,
roughness:0.4
});

const planet = new THREE.Mesh(geometry,material);
planetGroup.add(planet);

// ATMÓSFERA
const atmosphere = new THREE.Mesh(
new THREE.SphereGeometry(2.3,128,128),
new THREE.MeshBasicMaterial({
color:0xc77dff,
transparent:true,
opacity:0.15
})
);
planetGroup.add(atmosphere);

// ANILLO
const ringGeometry = new THREE.RingGeometry(2.8,4,128);
const ringMaterial = new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.3
});
const ring = new THREE.Mesh(ringGeometry,ringMaterial);
ring.rotation.x = Math.PI/2.4;
planetGroup.add(ring);

// -------- SEGUNDO PLANETA ORBITANDO --------
const smallPlanet = new THREE.Mesh(
new THREE.SphereGeometry(0.7,64,64),
new THREE.MeshStandardMaterial({
color:0x00c2ff,
emissive:0x0077ff,
emissiveIntensity:0.5
})
);
scene.add(smallPlanet);

let orbitAngle = 0;

// -------- ESTRELLAS --------
const starGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<8000;i++){
starVertices.push(
THREE.MathUtils.randFloatSpread(200),
THREE.MathUtils.randFloatSpread(200),
THREE.MathUtils.randFloatSpread(200)
);
}

starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));

const starMaterial = new THREE.PointsMaterial({color:0xffffff,size:0.7});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// -------- FRASES EN 3D --------
const frases = [
"Te amo 💜","Mi princesa 👑","Mi reina ❤️","Mi luna 🌙",
"Mi perla 🤍","Mi sol ☀️","Mi estrella ✨",
"Mi galaxia favorita 🌌","Mi goldita 🥺",
"Mi universo 🚀","Mi niña hermosa 💕",
"Mi bombón 🍬","Mi tesoro 💎",
"Mi vida 💖","Mi todo 💘",
"Mi bb 🧸","Mi amor 💋"
];

function crearTexto3D(texto){
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
canvas.width = 512;
canvas.height = 256;

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(texto,20,120);

const texture = new THREE.CanvasTexture(canvas);
const material = new THREE.SpriteMaterial({map:texture});
const sprite = new THREE.Sprite(material);

sprite.position.set(
THREE.MathUtils.randFloatSpread(30),
THREE.MathUtils.randFloatSpread(30),
THREE.MathUtils.randFloatSpread(30)
);

sprite.scale.set(4,2,1);
scene.add(sprite);
}

for(let i=0;i<300;i++){
crearTexto3D(frases[Math.floor(Math.random()*frases.length)]);
}

// -------- ANIMACIÓN --------
function animate(){
requestAnimationFrame(animate);

planetGroup.rotation.y += 0.002;

orbitAngle += 0.01;
smallPlanet.position.x = Math.cos(orbitAngle)*6;
smallPlanet.position.z = Math.sin(orbitAngle)*6;

controls.update();
renderer.render(scene,camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
