<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Universo 💜</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

#mensaje{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:20px;
font-weight:bold;
z-index:10;
text-shadow:0 0 15px #c77dff;
}

iframe{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
border-radius:12px;
z-index:10;
}
</style>
</head>
<body>

<div id="mensaje">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita ✨
</div>

<iframe
src="https://open.spotify.com/embed/track/46U8ErW47SBTzO6jzxfZlx"
width="300" height="80"
frameborder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 10;

// LUCES
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040,2);
scene.add(ambient);

// GRUPO PLANETA PRINCIPAL
const planetGroup = new THREE.Group();
scene.add(planetGroup);

// TEXTURA DINÁMICA
const canvasTexture = document.createElement("canvas");
canvasTexture.width = 2048;
canvasTexture.height = 1024;
const ctx = canvasTexture.getContext("2d");

const gradient = ctx.createRadialGradient(1024,512,150,1024,512,900);
gradient.addColorStop(0,"#ff00cc");
gradient.addColorStop(0.3,"#c77dff");
gradient.addColorStop(0.6,"#7209b7");
gradient.addColorStop(1,"#240046");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,2048,1024);

for(let i=0;i<15000;i++){
ctx.fillStyle="rgba(255,255,255,0.02)";
ctx.beginPath();
ctx.arc(Math.random()*2048,Math.random()*1024,Math.random()*2.5,0,Math.PI*2);
ctx.fill();
}

const texture = new THREE.CanvasTexture(canvasTexture);

const geometry = new THREE.SphereGeometry(2.5,256,256);
const material = new THREE.MeshStandardMaterial({
map:texture,
emissive:0xaa00ff,
emissiveIntensity:0.8,
metalness:0.6,
roughness:0.3
});

const planet = new THREE.Mesh(geometry,material);
planetGroup.add(planet);

// ATMÓSFERA
const atmosphereGeometry = new THREE.SphereGeometry(2.7,128,128);
const atmosphereMaterial = new THREE.MeshBasicMaterial({
color:0xff66ff,
transparent:true,
opacity:0.2
});
const atmosphere = new THREE.Mesh(atmosphereGeometry,atmosphereMaterial);
planetGroup.add(atmosphere);

// ANILLO
const ringGeometry = new THREE.RingGeometry(3.2,4.5,256);
const ringMaterial = new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.25
});
const ring = new THREE.Mesh(ringGeometry,ringMaterial);
ring.rotation.x = Math.PI/2.4;
planetGroup.add(ring);

// SEGUNDO PLANETA ORBITANDO
const smallPlanetGeometry = new THREE.SphereGeometry(0.8,128,128);
const smallPlanetMaterial = new THREE.MeshStandardMaterial({
color:0x00b4ff,
emissive:0x0077ff,
emissiveIntensity:0.6
});
const smallPlanet = new THREE.Mesh(smallPlanetGeometry,smallPlanetMaterial);
scene.add(smallPlanet);

let angle = 0;

// ESTRELLAS
const starGeometry = new THREE.BufferGeometry();
const starCount = 8000;
const positions = [];

for(let i=0;i<starCount;i++){
positions.push(
(Math.random()-0.5)*300,
(Math.random()-0.5)*300,
(Math.random()-0.5)*300
);
}

starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
const starMaterial = new THREE.PointsMaterial({color:0xffffff});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// FRASES FLOTANDO
const frases = [
"Te amo 💜","Mi princesa 👑","Mi reina ❤️","Mi luna 🌙",
"Mi perla 🤍","Mi sol ☀️","Mi estrella ✨",
"Mi galaxia favorita 🌌","Mi goldita 🥺",
"Mi universo 🚀","Mi niña hermosa 💕",
"Mi bombón 🍬","Mi tesoro 💎",
"Mi vida 💖","Mi todo 💘",
"Mi bb 🧸","Mi amor 💋"
];

function crearTexto(texto){
const div = document.createElement("div");
div.innerText = texto;
div.style.position="absolute";
div.style.color="white";
div.style.fontSize=(Math.random()*20+12)+"px";
div.style.left=Math.random()*window.innerWidth+"px";
div.style.top=Math.random()*window.innerHeight+"px";
div.style.opacity=0.8;
document.body.appendChild(div);
}

for(let i=0;i<500;i++){
crearTexto(frases[Math.floor(Math.random()*frases.length)]);
}

// CONTROL TÁCTIL
let isDragging=false;
let previousMousePosition={x:0,y:0};

document.addEventListener("mousedown", ()=> isDragging=true);
document.addEventListener("mouseup", ()=> isDragging=false);

document.addEventListener("mousemove",(e)=>{
if(isDragging){
let deltaMove={
x:e.offsetX-previousMousePosition.x,
y:e.offsetY-previousMousePosition.y
};
planetGroup.rotation.y += deltaMove.x*0.005;
planetGroup.rotation.x += deltaMove.y*0.005;
}
previousMousePosition={x:e.offsetX,y:e.offsetY};
});

// ANIMACIÓN
function animate(){
requestAnimationFrame(animate);

planetGroup.rotation.y += 0.002;

// órbita segundo planeta
angle += 0.01;
smallPlanet.position.x = Math.cos(angle)*6;
smallPlanet.position.z = Math.sin(angle)*6;

// pulso energía
planet.material.emissiveIntensity = 0.7 + Math.sin(Date.now()*0.002)*0.3;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
