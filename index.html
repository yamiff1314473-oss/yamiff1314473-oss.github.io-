<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Universo 💜</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

#mensaje{
position:absolute;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
font-weight:bold;
z-index:10;
text-shadow:0 0 15px #c77dff;
}

iframe{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
border-radius:12px;
z-index:10;
}
</style>
</head>
<body>

<div id="mensaje">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita ✨
</div>

<iframe 
src="https://open.spotify.com/embed/track/46U8ErW47SBTzO6jzxfZlx"
width="300" height="80"
frameborder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 10;

// LUCES
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040,2));

// GRUPO
const planetGroup = new THREE.Group();
scene.add(planetGroup);

// PLANETA PRINCIPAL MEJORADO
const geometry = new THREE.SphereGeometry(2,128,128);
const material = new THREE.MeshStandardMaterial({
color:0x7b2cbf,
emissive:0x5a189a,
emissiveIntensity:0.7,
metalness:0.6,
roughness:0.4
});
const planet = new THREE.Mesh(geometry,material);
planetGroup.add(planet);

// BRILLO CENTRAL
const glowGeometry = new THREE.SphereGeometry(2.05,128,128);
const glowMaterial = new THREE.MeshBasicMaterial({
color:0xff00ff,
transparent:true,
opacity:0.15
});
const glow = new THREE.Mesh(glowGeometry,glowMaterial);
planetGroup.add(glow);

// ANILLO
const ringGeometry = new THREE.RingGeometry(2.6,3.8,128);
const ringMaterial = new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.25
});
const ring = new THREE.Mesh(ringGeometry,ringMaterial);
ring.rotation.x = Math.PI/2.4;
planetGroup.add(ring);

// SEGUNDO PLANETA AZUL
const geometry2 = new THREE.SphereGeometry(1.2,128,128);
const material2 = new THREE.MeshStandardMaterial({
color:0x00b4d8,
emissive:0x0077b6,
emissiveIntensity:0.5,
metalness:0.5,
roughness:0.5
});
const planet2 = new THREE.Mesh(geometry2,material2);
planet2.position.x = -4;
planetGroup.add(planet2);

// ESTRELLAS FINAS REALISTAS
const starGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<10000;i++){
starVertices.push(
(Math.random()-0.5)*300,
(Math.random()-0.5)*300,
(Math.random()-0.5)*300
);
}

starGeometry.setAttribute('position',
new THREE.Float32BufferAttribute(starVertices,3)
);

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.08,
transparent:true,
opacity:0.9,
sizeAttenuation:true
});

const stars = new THREE.Points(starGeometry,starMaterial);
scene.add(stars);

// FRASES FLOTANTES BIEN DISTRIBUIDAS
const frases = [
"Te amo 💜","Mi princesa 👑","Mi reina ❤️","Mi luna 🌙",
"Mi perla 🤍","Mi sol ☀️","Mi estrella ✨",
"Mi galaxia favorita 🌌","Mi goldita 🥺",
"Mi universo 🚀","Mi niña hermosa 💕",
"Mi bombón 🍬","Mi tesoro 💎",
"Mi vida 💖","Mi todo 💘",
"Mi bb 🧸","Mi amor 💋",
"Mi cielo 🌠","Mi corazón ❤️","Mi angelito 😇"
];

for(let i=0;i<500;i++){
const div = document.createElement("div");
div.innerText = frases[Math.floor(Math.random()*frases.length)];
div.style.position="absolute";
div.style.color="white";
div.style.fontSize=(Math.random()*16+10)+"px";
div.style.left=Math.random()*window.innerWidth+"px";
div.style.top=Math.random()*window.innerHeight+"px";
div.style.opacity=0.7;
div.style.pointerEvents="none";
document.body.appendChild(div);
}

// GIRAR CON DEDO (TACTIL)
let isDragging=false;
let prevX=0, prevY=0;

document.addEventListener("touchstart",(e)=>{
isDragging=true;
prevX=e.touches[0].clientX;
prevY=e.touches[0].clientY;
});

document.addEventListener("touchend",()=>isDragging=false);

document.addEventListener("touchmove",(e)=>{
if(!isDragging) return;

let deltaX=e.touches[0].clientX-prevX;
let deltaY=e.touches[0].clientY-prevY;

planetGroup.rotation.y += deltaX*0.005;
planetGroup.rotation.x += deltaY*0.005;

prevX=e.touches[0].clientX;
prevY=e.touches[0].clientY;
});

// ANIMACIÓN
function animate(){
requestAnimationFrame(animate);
planet.rotation.y += 0.002;
planet2.rotation.y -= 0.003;
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
