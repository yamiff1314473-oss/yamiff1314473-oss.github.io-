<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Galaxia 💜</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

.stars{
  width:1px;
  height:1px;
  background:white;
  position:absolute;
  box-shadow:
  100px 200px white,
  300px 400px white,
  500px 100px white,
  700px 300px white,
  900px 500px white,
  1200px 200px white,
  1500px 400px white,
  1700px 600px white,
  200px 700px white,
  400px 900px white,
  800px 1200px white,
  1000px 1500px white;
  animation: animStar 50s linear infinite;
}

@keyframes animStar{
  from{transform: translateY(0px);}
  to{transform: translateY(-2000px);}
}

h1{
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  color:#ff69b4;
  font-size:35px;
  text-shadow:0 0 20px #ff69b4;
}
</style>
</head>

<body>

<div class="stars"></div>

<h1 contenteditable="true">
Escribe aquí tu mensaje 💖
</h1>

</body>
</html>
