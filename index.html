<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universo Goldix 💜</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
}

.titulo{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
z-index:10;
text-shadow:0 0 20px #a020f0;
}

.controls{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:10;
text-align:center;
}
</style>
</head>

<body>

<div class="titulo">
Te amo mi Goldix hermosa 🥺💜  
Mi princesa, mi reina, mi luna, mi perla, mi sol, mi estrella, mi galaxia favorita ✨
</div>

<div class="controls">
<input type="file" id="musicInput" accept="audio/*">
</div>

<audio id="audio" controls style="
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
z-index:10;"></audio>

<canvas id="space"></canvas>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ESTRELLAS
let stars=[];
for(let i=0;i<1200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function drawStars(){
for(let s of stars){
ctx.fillStyle="white";
ctx.fillRect(s.x,s.y,s.size,s.size);
s.y+=0.4;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
}
}

// PLANETA PRO
let angle=0;

function drawPlanet(){
let cx=canvas.width/2;
let cy=canvas.height/2;

angle+=0.01;

let gradient=ctx.createRadialGradient(
cx-80*Math.cos(angle),
cy-80*Math.sin(angle),
60,
cx,cy,220
);

gradient.addColorStop(0,"#ff00ff");
gradient.addColorStop(0.3,"#c77dff");
gradient.addColorStop(0.6,"#7b2cbf");
gradient.addColorStop(1,"#240046");

ctx.fillStyle=gradient;
ctx.beginPath();
ctx.arc(cx,cy,180,0,Math.PI*2);
ctx.fill();

// atmósfera
ctx.strokeStyle="rgba(200,150,255,0.4)";
ctx.lineWidth=25;
ctx.beginPath();
ctx.arc(cx,cy,200,0,Math.PI*2);
ctx.stroke();

// anillo
ctx.strokeStyle="rgba(255,255,255,0.6)";
ctx.lineWidth=10;
ctx.beginPath();
ctx.ellipse(cx,cy,260,80,0.4,0,Math.PI*2);
ctx.stroke();
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawStars();
drawPlanet();
requestAnimationFrame(animate);
}
animate();

// MÚSICA
const input=document.getElementById("musicInput");
const audio=document.getElementById("audio");

input.addEventListener("change",function(){
const file=this.files[0];
if(file){
const url=URL.createObjectURL(file);
audio.src=url;
audio.play();
}
});
</script>

</body>
</html>
