<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Universo 💜</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

#mensaje{
position:absolute;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
font-weight:bold;
z-index:10;
text-shadow:0 0 15px #c77dff;
}

iframe{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
border-radius:12px;
z-index:10;
}
</style>
</head>
<body>

<div id="mensaje">
Te amo mi Goldix hermosa 🥺💜 mi princesa mi reina mi luna mi perla mi sol mi estrella mi galaxia favorita ✨
</div>

<iframe 
src="https://open.spotify.com/embed/track/46U8ErW47SBTzO6jzxfZlx"
width="300" height="80"
frameborder="0"
allow="autoplay; encrypted-media">
</iframe>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 10;

scene.add(new THREE.AmbientLight(0xffffff,1.3));
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

const group = new THREE.Group();
scene.add(group);

const geometry = new THREE.SphereGeometry(2,128,128);
const material = new THREE.MeshStandardMaterial({
color:0x9d4edd,
emissive:0x5a189a,
emissiveIntensity:0.7,
metalness:0.6,
roughness:0.4
});
const planet = new THREE.Mesh(geometry,material);
group.add(planet);

const ringGeo = new THREE.RingGeometry(2.6,3.6,128);
const ringMat = new THREE.MeshBasicMaterial({
color:0xffffff,
side:THREE.DoubleSide,
transparent:true,
opacity:0.25
});
const ring = new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x = Math.PI/2.5;
group.add(ring);

const starGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<9000;i++){
starVertices.push(
(Math.random()-0.5)*300,
(Math.random()-0.5)*300,
(Math.random()-0.5)*300
);
}

starGeometry.setAttribute('position',
new THREE.Float32BufferAttribute(starVertices,3)
);

const starMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.04
});

const stars = new THREE.Points(starGeometry,starMaterial);
scene.add(stars);

function createTextSprite(message) {
const canvas = document.createElement('canvas');
const context = canvas.getContext('2d');
context.font = "Bold 40px Arial";
context.fillStyle = "white";
context.fillText(message, 10, 40);

const texture = new THREE.CanvasTexture(canvas);
const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent:true });
const sprite = new THREE.Sprite(spriteMaterial);

sprite.scale.set(4,2,1);
sprite.position.set(
(Math.random()-0.5)*40,
(Math.random()-0.5)*40,
(Math.random()-0.5)*40
);

scene.add(sprite);
}

const frases = [
"Te amo 💜","Mi princesa 👑","Mi reina ❤️","Mi luna 🌙",
"Mi perla 🤍","Mi sol ☀️","Mi estrella ✨",
"Mi galaxia favorita 🌌","Mi goldita 🥺",
"Mi universo 🚀","Mi niña hermosa 💕",
"Mi bombón 🍬","Mi tesoro 💎",
"Mi vida 💖","Mi todo 💘",
"Mi bb 🧸","Mi amor 💋"
];

for(let i=0;i<150;i++){
createTextSprite(frases[Math.floor(Math.random()*frases.length)]);
}

let isDragging=false;
let prevX=0;
let prevY=0;

document.addEventListener("touchstart",(e)=>{
isDragging=true;
prevX=e.touches[0].clientX;
prevY=e.touches[0].clientY;
});

document.addEventListener("touchend",()=>isDragging=false);

document.addEventListener("touchmove",(e)=>{
if(!isDragging) return;

let deltaX=e.touches[0].clientX-prevX;
let deltaY=e.touches[0].clientY-prevY;

group.rotation.y += deltaX*0.005;
group.rotation.x += deltaY*0.005;

prevX=e.touches[0].clientX;
prevY=e.touches[0].clientY;
});

function animate(){
requestAnimationFrame(animate);
planet.rotation.y += 0.002;
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
