<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Galaxia 💜</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at center, #2b0055 0%, #000000 70%);
  font-family: Arial, sans-serif;
}

/* Estrellas */
.stars{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
}

.stars::after{
  content:"";
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  box-shadow:
  100px 200px white,
  300px 400px white,
  500px 600px white,
  700px 800px white,
  900px 1000px white,
  1100px 1200px white,
  1300px 1400px white,
  1500px 1600px white,
  1700px 1800px white,
  1900px 2000px white;
  animation: moveStars 40s linear infinite;
}

@keyframes moveStars{
  from{transform:translateY(0);}
  to{transform:translateY(-2000px);}
}

/* Planeta */
.planet{
  position:absolute;
  width:300px;
  height:300px;
  background: radial-gradient(circle at 30% 30%, #c77dff, #7209b7);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 50px #a855f7;
}

/* Anillo */
.ring{
  position:absolute;
  width:420px;
  height:120px;
  border:8px solid rgba(255,255,255,0.6);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotateX(65deg);
}

/* Texto arriba */
.message{
  position:absolute;
  top:40px;
  width:100%;
  text-align:center;
  color:white;
  font-size:20px;
}

/* Apodos flotando */
.nickname{
  position:absolute;
  color:white;
  font-size:14px;
  animation: float 20s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-100vh);}
}

/* Música */
.music{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="message">
Te Amo Muchote Mis Ojitos Brillantes 💛
</div>

<div class="planet"></div>
<div class="ring"></div>

<!-- Apodos -->
<div class="nickname" style="left:10%;">Mi Tesoro 💛</div>
<div class="nickname" style="left:30%;">Mi Bombom 💜</div>
<div class="nickname" style="left:50%;">Mi Princesa 👑</div>
<div class="nickname" style="left:70%;">Mi Vida 💕</div>
<div class="nickname" style="left:85%;">Mi Todo ✨</div>

<!-- Música -->
<div class="music">
<audio controls>
<source src="cancion.mp3" type="audio/mpeg">
</audio>
</div>

</body>
</html>
